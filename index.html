<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receita Pública - Acordo Judicial de Brumadinho</title>
    
    <!-- ==================== ESTILOS E BIBLIOTECAS ==================== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        :root {
            --primary-dark: #1a3a5c;
            --primary-darker: #0f2a44;
            --accent-red: #b93c42;
            --accent-bright: #db233f;
            --background-light: #f5f7fa;
            --success-green: #28a745;
            --warning-yellow: #ffc107;
            --info-blue: #17a2b8;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--background-light);
            padding-bottom: 15px;
            overflow: visible !important;
        }

        html { overflow: visible !important; }

        .data-atualizacao-container {
            display: flex;
            justify-content: left;
            align-items: center;
            margin: 20px 0;
        }
        
        .data-atualizacao-box {
            background: white;
            border-radius: 8px;
            padding: 8px 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: 600;
        }
        
        .data-atualizacao-box i {
            font-size: 14px;
            color: var(--accent-red);
        }

        .filter-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-red);
        }
        
        .filter-label {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 6px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .filter-label i { font-size: 18px; color: var(--accent-red); }
        
        .form-control, .form-select {
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            height: 42px;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--accent-red);
            box-shadow: 0 0 0 2px rgba(185, 60, 66, 0.15);
        }

        .metric-card {
            background: white;
            border-radius: 10px;
            padding: 15px 12px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            border-top: 4px solid var(--primary-dark);
            transition: all 0.3s ease;
            height: 100%;
        }
        
        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        }
        
        .metric-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 5px 0;
            line-height: 1.2;
            word-break: break-word;
        }
        
        .metric-label {
            font-size: 13px;
            color: var(--primary-darker);
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            height: 100%;
            min-height: 320px;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--background-light);
        }
        
        .chart-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary-dark);
            margin: 0;
        }
        
        .chart-wrapper {
            position: relative;
            height: 240px;
            width: 100%;
        }

        .table-container {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }
        
        .table-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .table-title {
            font-size: 15px;
            font-weight: 600;
            margin: 0;
        }
        
        .table-badge {
            background: var(--accent-red);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 600;
        }
        
        .table-fixed-header-container {
            position: relative;
            max-height: 600px;
            overflow: auto;
        }
        
        .table-fixed-header-container table thead th {
            background-color: var(--primary-dark) !important;
            color: white !important;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            padding: 12px 8px;
            font-size: 12px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .table {
            width: 100%;
            font-size: 12px;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        .table tbody td {
            padding: 10px 8px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f1f1;
            white-space: normal;
            word-wrap: break-word;
            max-width: 300px;
        }
        
        .table tbody tr:hover {
            background-color: rgba(26, 58, 92, 0.04);
        }

        .text-right { text-align: right; }
        .text-center { text-align: center; }

        .orgao-link {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            white-space: normal;
            word-wrap: break-word;
        }
        .orgao-link:hover { 
            color: var(--accent-red); 
            text-decoration: underline;
        }

        .orgao-cell {
            white-space: normal;
            word-wrap: break-word;
            min-width: 200px;
            max-width: 300px;
        }

        .badge-categoria {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-corrente { background-color: #e3f2fd; color: #0d47a1; }
        .badge-capital { background-color: #fce4ec; color: #880e4f; }
        .badge-intra { background-color: #e8f5e9; color: #1b5e20; }
        .badge-outros { background-color: #f5f5f5; color: #616161; }

        .btn-primary-custom {
            background: linear-gradient(to right, var(--primary-darker), var(--primary-dark));
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 14px;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            height: 42px;
        }
        .btn-primary-custom:hover {
            background: linear-gradient(to right, var(--accent-red), #a32c32);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(185, 60, 66, 0.2);
            color: white;
        }
        
        .btn-secondary-custom {
            background: white;
            border: 2px solid var(--primary-darker);
            color: var(--primary-darker);
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            height: 42px;
        }
        .btn-secondary-custom:hover {
            background-color: var(--primary-darker);
            color: white;
            transform: translateY(-1px);
        }
        
        .btn-export {
            background: white;
            border: 2px solid var(--primary-darker);
            color: var(--primary-darker);
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            height: 38px;
        }
        .btn-export:hover {
            background: var(--primary-darker);
            color: white;
            transform: translateY(-1px);
        }

        .btn-action {
            padding: 6px;
            border-radius: 4px;
            border: none;
            background-color: var(--primary-dark);
            color: white;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-action:hover { background-color: var(--accent-red); }

        .btn-search {
            background: var(--accent-red);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            height: 38px;
        }
        .btn-search:hover {
            background: #a32c32;
            transform: translateY(-1px);
        }

        .share-dropdown {
            position: relative;
            display: inline-block;
        }
        
        .share-options {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background-color: white;
            min-width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 8px;
            z-index: 1000;
            border: 1px solid #dee2e6;
            margin-top: 5px;
        }
        
        .share-options.show { display: block; }
        
        .share-options a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            color: var(--primary-dark);
            transition: background 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .share-options a:hover { background-color: var(--background-light); color: var(--accent-red); }
        .share-options a i { font-size: 18px; width: 20px; text-align: center; }

        .nav-tabs-container {
            background: white;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
            overflow-x: auto;
        }
        .nav-tabs { border: none !important; gap: 4px; flex-wrap: nowrap; }
        .nav-tabs .nav-link {
            border: none !important;
            border-radius: 6px !important;
            padding: 10px 15px !important;
            font-weight: 600;
            color: var(--primary-dark) !important;
            font-size: 16px;
            white-space: nowrap;
            display: inline-flex !important;
            align-items: center;
        }
        .nav-tabs .nav-link:hover { background-color: rgba(26, 58, 92, 0.05) !important; color: var(--accent-red) !important; }
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%) !important;
            color: white !important;
        }
        .nav-tabs .nav-link .material-icons { font-size: 18px !important; margin-right: 8px !important; }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .action-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            border: 2px solid var(--primary-dark) !important;
            border-radius: 6px !important;
            padding: 8px 12px !important;
            font-size: 13px !important;
            background-color: white;
            color: var(--primary-dark);
            height: 38px;
            width: 200px;
        }
        .search-box:focus {
            border-color: var(--accent-red) !important;
            box-shadow: 0 0 0 2px rgba(185, 60, 66, 0.15);
            outline: none;
        }

        .total-badge {
            background: var(--primary-dark);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .sortable {
            cursor: pointer;
            position: relative;
            padding-right: 20px !important;
        }
        .sortable:after {
            content: '↕️';
            position: absolute;
            right: 5px;
            opacity: 0.3;
            font-size: 12px;
        }
        .sortable.asc:after {
            content: '↑';
            opacity: 1;
        }
        .sortable.desc:after {
            content: '↓';
            opacity: 1;
        }

        .modal-creative .modal-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white;
            padding: 15px 20px;
            border-bottom: none;
        }
        
        .modal-creative .modal-body { 
            padding: 20px; 
            background: #f8fafc;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .modal-orgao {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-red);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent-red);
        }
        
        .modal-ano {
            font-size: 14px;
            color: var(--primary-dark);
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .modal-resumo {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .modal-resumo-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        
        .modal-resumo-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #6c757d;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .modal-resumo-valor {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-dark);
            word-break: break-word;
        }
        
        .modal-classificacao {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--info-blue);
        }
        
        .modal-classificacao-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #6c757d;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .modal-classificacao-valor {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary-dark);
        }
        
        .modal-subtitulo {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 20px 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .modal-tabela-itens {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .modal-tabela-itens th {
            background: var(--primary-dark);
            color: white;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
        }
        
        .modal-tabela-itens td {
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .modal-tabela-itens tr:last-child td {
            border-bottom: none;
        }
        
        .modal-tabela-itens tr:hover {
            background-color: #f8f9fa;
        }
        
        .modal-valor-previsto {
            color: #6c757d;
        }
        
        .modal-valor-contabilizado {
            font-weight: 700;
            color: var(--accent-red);
        }

        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #dee2e6;
        }
        
        .pagination-info {
            font-size: 13px;
            color: #6c757d;
        }
        
        .pagination .page-link {
            color: var(--primary-dark);
            border-color: #dee2e6;
        }
        .pagination .page-link:hover {
            color: var(--accent-red);
            background-color: #f8f9fa;
            border-color: #dee2e6;
        }
        .pagination .page-item.active .page-link {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
            color: white;
        }
        
        .items-per-page {
            width: 70px;
            border: 2px solid var(--primary-dark) !important;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            background-color: white;
            color: var(--primary-dark);
            font-weight: 600;
            cursor: pointer;
        }

        .metadata-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid var(--info-blue);
        }
        
        .metadata-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .metadata-table th {
            background-color: var(--primary-dark);
            color: white;
            padding: 10px;
            text-align: left;
            font-weight: 600;
        }
        
        .metadata-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .metadata-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        
        .metadata-table td:first-child {
            font-weight: 600;
            color: var(--primary-dark);
        }
        
        .tipo-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .tipo-texto { background-color: #e3f2fd; color: #0d47a1; }
        .tipo-numero { background-color: #fce4ec; color: #880e4f; }
        .tipo-data { background-color: #e8f5e9; color: #1b5e20; }

        .table-footer {
            background-color: #f8f9fa;
            font-weight: 700;
            border-top: 2px solid var(--primary-dark);
        }
        .table-footer td {
            padding: 12px 10px !important;
            background-color: #f8f9fa;
        }

        .column-selector {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #dee2e6;
        }
        
        .column-selector-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .column-selector-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .column-selector-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }
        
        .column-selector-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .code-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background: white;
            border-radius: 6px;
            border: 2px solid var(--primary-dark);
            margin-top: 10px;
        }
        
        .code-toggle label {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-dark);
            cursor: pointer;
        }
        
        .code-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn-clear-columns {
            background: white;
            border: 2px solid var(--accent-red);
            color: var(--accent-red);
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-clear-columns:hover {
            background: var(--accent-red);
            color: white;
        }

        .fixed-columns-label {
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: 600;
            margin-left: 15px;
            padding-left: 15px;
            border-left: 2px solid #dee2e6;
        }

        .codigo-descricao {
            display: inline-block;
        }
        .codigo {
            font-weight: 600;
            color: var(--primary-dark);
            margin-right: 4px;
        }
        .descricao {
            color: #666;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="container dashboard-spacing">
            <!-- ==================== MENU DE NAVEGAÇÃO ==================== -->
            <div class="nav-tabs-container">
                <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
                    <li class="nav-item"><button class="nav-link active" id="visao-geral-tab" data-bs-toggle="tab" data-bs-target="#visao-geral"><i class="material-icons">bar_chart</i>Visão Geral</button></li>
                    <li class="nav-item"><button class="nav-link" id="detalhamento-tab" data-bs-toggle="tab" data-bs-target="#detalhamento"><i class="material-icons">receipt</i>Detalhamento Completo</button></li>
                    <li class="nav-item"><button class="nav-link" id="downloads-tab" data-bs-toggle="tab" data-bs-target="#downloads"><i class="material-icons">download</i>Downloads</button></li>
                </ul>
            </div>

            <!-- ==================== DATA DE ATUALIZAÇÃO ==================== -->
            <div class="data-atualizacao-container">
                <div class="data-atualizacao-box">
                    <i class="material-icons">update</i> Atualizado em: <span id="data-atualizacao-header">Carregando...</span>
                </div>
            </div>

            <!-- ==================== CONTEÚDO DAS ABAS ==================== -->
            <div class="tab-content" id="dashboardTabsContent">
                <div class="tab-pane fade show active" id="visao-geral" role="tabpanel">
                    <div id="visao-geral-content"></div>
                </div>
                <div class="tab-pane fade" id="detalhamento" role="tabpanel">
                    <div id="detalhamento-content"></div>
                </div>
                <div class="tab-pane fade" id="downloads" role="tabpanel">
                    <div id="downloads-content"></div>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content modal-creative">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="material-icons me-2">receipt</i> Detalhamento da Receita</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary-custom" data-bs-dismiss="modal"><i class="material-icons me-2">close</i>Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction: column;">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="text-primary fw-bold mt-3">Carregando dados de receita 2022-2026...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ============================================
        // CONFIGURAÇÕES E VARIÁVEIS GLOBAIS
        // ============================================
        const RECEITA_URLS = [
            'https://raw.githubusercontent.com/transparencia-mg/portal_receita/main/dataset/data/receita_2026.csv',
            'https://raw.githubusercontent.com/transparencia-mg/portal_receita/main/dataset/data/receita_2025.csv',
            'https://raw.githubusercontent.com/transparencia-mg/portal_receita/main/dataset/data/receita_2024.csv',
            'https://raw.githubusercontent.com/transparencia-mg/portal_receita/main/dataset/data/receita_2023.csv',
            'https://raw.githubusercontent.com/transparencia-mg/portal_receita/main/dataset/data/receita_2022.csv'
        ];
        
        let dadosCompletos = [];
        let timers = {};
        
        // Estado das abas
        let filtrosGeral = { ano: '' };
        let filtrosDetalhamento = { 
            ano: '', orgao: '', classificacao: '', categoria: '', origem: '', especie: '', tipo: '',
            fonte: '', item: '', subitem: '', nivel1: '', nivel2: '', nivel3: '' 
        };
        
        // Busca textual
        let buscaGeral = '';
        let buscaDetalhamento = '';
        
        // Paginação
        let paginaAtual = { geral: 1, detalhamento: 1 };
        let itensPorPagina = 50;
        
        // Ordenação
        let ordenacaoGeral = { coluna: 'orgao', direcao: 'asc' };
        let ordenacaoDetalhamento = { coluna: 'orgao', direcao: 'asc' };
        
        // Configuração de colunas (agora apenas as que podem ser ocultadas)
        let colunasVisiveis = {
            orgao: true,
            classificacao: true,
            categoria: true,
            fonte: true,
            origem: true,
            especie: true,
            nivel1: true,
            nivel2: true,
            nivel3: true,
            item: true,
            subitem: true
        };
        
        let mostrarCodigos = false;

        // ============================================
        // FUNÇÕES DE INICIALIZAÇÃO
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            setupAtualizacaoData();
            setupEventListeners();
            carregarDados();
        });

        function setupAtualizacaoData() {
            const now = new Date();
            const dataFormatada = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR');
            document.getElementById('data-atualizacao-header').textContent = dataFormatada;
        }

        function setupEventListeners() {
            window.addEventListener('click', (e) => {
                if (!e.target.closest('.share-dropdown')) {
                    document.querySelectorAll('.share-options').forEach(opt => opt.classList.remove('show'));
                }
            });
        }

        function mostrarLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function showError(message) {
            const container = document.querySelector('.main-container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'alert alert-danger alert-dismissible fade show';
            errorDiv.innerHTML = `
                <i class="material-icons me-2" style="vertical-align: middle;">warning</i>
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            container.prepend(errorDiv);
            setTimeout(() => errorDiv.remove(), 5000);
        }

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        function formatarMoeda(valor) {
            if (!valor && valor !== 0) return 'R$ 0,00';
            const valorNum = typeof valor === 'string' ? parseFloat(valor.replace(',', '.')) : valor;
            return valorNum.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 });
        }

        function formatarNumero(valor) {
            if (!valor && valor !== 0) return '0,00';
            const valorNum = typeof valor === 'string' ? parseFloat(valor.replace(',', '.')) : valor;
            return valorNum.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function calcularPercentual(contabilizado, previsto) {
            if (!previsto || previsto === 0) return '0,0';
            return ((contabilizado / previsto) * 100).toFixed(1);
        }

        function getCategoriaBadgeClass(categoria) {
            if (!categoria) return 'badge-outros';
            const cat = categoria.toLowerCase();
            if (cat.includes('corrente')) return 'badge-corrente';
            if (cat.includes('capital')) return 'badge-capital';
            if (cat.includes('intra')) return 'badge-intra';
            return 'badge-outros';
        }

        function parseCSV(texto) {
            const linhas = texto.trim().split('\n');
            const cabecalhos = linhas[0].split(';').map(h => h.trim().replace(/^["']|["']$/g, ''));
            const dados = [];
            
            for (let i = 1; i < linhas.length; i++) {
                if (!linhas[i].trim()) continue;
                
                const valores = [];
                let campoAtual = '';
                let dentroAspas = false;
                
                for (let char of linhas[i]) {
                    if (char === '"') {
                        dentroAspas = !dentroAspas;
                    } else if (char === ';' && !dentroAspas) {
                        valores.push(campoAtual);
                        campoAtual = '';
                    } else {
                        campoAtual += char;
                    }
                }
                valores.push(campoAtual);
                
                const linha = {};
                cabecalhos.forEach((cab, idx) => {
                    let valor = valores[idx] || '';
                    valor = valor.replace(/^["']|["']$/g, '');
                    
                    if (cab.includes('valor') || cab.includes('previsto') || cab.includes('contabilizado')) {
                        valor = parseFloat(valor.replace(',', '.')) || 0;
                    }
                    
                    linha[cab] = valor;
                });
                
                dados.push(linha);
            }
            
            return dados;
        }

        function aplicarFiltros(dados, filtros) {
            return dados.filter(item => {
                for (let [key, value] of Object.entries(filtros)) {
                    if (!value) continue;
                    
                    switch(key) {
                        case 'ano':
                            if (item.ano_de_exercicio != value) return false;
                            break;
                        case 'orgao':
                            if (item.unidade_orcamentaria_nome !== value) return false;
                            break;
                        case 'categoria':
                            if (item.categoria_receita_descricao !== value) return false;
                            break;
                        case 'origem':
                            if (item.origem_receita_descricao !== value) return false;
                            break;
                        case 'especie':
                            if (item.especie_receita_descricao !== value) return false;
                            break;
                        case 'tipo':
                            if (item.tipo_receita_descricao !== value) return false;
                            break;
                        case 'fonte':
                            if (item.fonte_recurso_descricao !== value) return false;
                            break;
                        case 'classificacao':
                            if (item.classificacao_receita_formatado !== value) return false;
                            break;
                        case 'item':
                            if (item.item_receita_descricao !== value) return false;
                            break;
                        case 'subitem':
                            if (item.subitem_receita_descricao !== value) return false;
                            break;
                        case 'nivel1':
                            if (item.nivel_1_desdobramento_descricao !== value) return false;
                            break;
                        case 'nivel2':
                            if (item.nivel_2_desdobramento_descricao !== value) return false;
                            break;
                        case 'nivel3':
                            if (item.nivel_3_desdobramento_descricao !== value) return false;
                            break;
                    }
                }
                return true;
            });
        }

        function aplicarBusca(dados, termo, campos) {
            if (!termo) return dados;
            
            termo = termo.toLowerCase();
            return dados.filter(item => {
                return campos.some(campo => {
                    const valor = item[campo];
                    return valor && valor.toString().toLowerCase().includes(termo);
                });
            });
        }

        // Função com debounce para busca
        function debounceBusca(tipo, valor, funcao, delay = 500) {
            if (timers[tipo]) clearTimeout(timers[tipo]);
            timers[tipo] = setTimeout(() => {
                funcao(valor);
            }, delay);
        }

        // ============================================
        // CARREGAMENTO DE DADOS
        // ============================================
        async function carregarDados() {
            mostrarLoading(true);
            try {
                const promises = RECEITA_URLS.map(url => 
                    fetch(url)
                        .then(res => res.ok ? res.text() : null)
                        .catch(() => null)
                );
                
                const resultados = await Promise.all(promises);
                let todosDados = [];
                
                resultados.forEach((texto, index) => {
                    if (texto) {
                        const dados = parseCSV(texto);
                        todosDados = [...todosDados, ...dados];
                        console.log(`Carregados ${dados.length} registros de ${RECEITA_URLS[index]}`);
                    }
                });
                
                dadosCompletos = todosDados;
                
                if (dadosCompletos.length === 0) {
                    showError('Nenhum dado encontrado. Verifique os arquivos CSV.');
                } else {
                    console.log(`Total de registros carregados: ${dadosCompletos.length}`);
                    
                    const anos = [...new Set(dadosCompletos.map(i => i.ano_de_exercicio))].filter(Boolean).sort();
                    if (anos.length > 0) {
                        const anoAtual = anos[anos.length - 1];
                        filtrosGeral.ano = anoAtual;
                        filtrosDetalhamento.ano = anoAtual;
                    }
                    
                    renderizarVisaoGeral();
                    renderizarDetalhamento();
                    renderizarDownloads();
                }
            } catch (erro) {
                console.error('Erro:', erro);
                showError('Erro ao carregar dados. Tente novamente mais tarde.');
            } finally {
                mostrarLoading(false);
            }
        }

        function getOpcoesFiltro() {
            const anos = [...new Set(dadosCompletos.map(i => i.ano_de_exercicio))].filter(Boolean).sort().reverse();
            const orgaos = [...new Set(dadosCompletos.map(i => i.unidade_orcamentaria_nome))].filter(Boolean).sort();
            const categorias = [...new Set(dadosCompletos.map(i => i.categoria_receita_descricao))].filter(Boolean).sort();
            const origens = [...new Set(dadosCompletos.map(i => i.origem_receita_descricao))].filter(Boolean).sort();
            const especies = [...new Set(dadosCompletos.map(i => i.especie_receita_descricao))].filter(Boolean).sort();
            const tipos = [...new Set(dadosCompletos.map(i => i.tipo_receita_descricao))].filter(Boolean).sort();
            const fontes = [...new Set(dadosCompletos.map(i => i.fonte_recurso_descricao))].filter(Boolean).sort();
            const classificacoes = [...new Set(dadosCompletos.map(i => i.classificacao_receita_formatado))].filter(Boolean).sort();
            const itens = [...new Set(dadosCompletos.map(i => i.item_receita_descricao))].filter(Boolean).sort();
            const subitens = [...new Set(dadosCompletos.map(i => i.subitem_receita_descricao))].filter(Boolean).sort();
            const niveis1 = [...new Set(dadosCompletos.map(i => i.nivel_1_desdobramento_descricao))].filter(Boolean).sort();
            const niveis2 = [...new Set(dadosCompletos.map(i => i.nivel_2_desdobramento_descricao))].filter(Boolean).sort();
            const niveis3 = [...new Set(dadosCompletos.map(i => i.nivel_3_desdobramento_descricao))].filter(Boolean).sort();
            
            return { anos, orgaos, categorias, origens, especies, tipos, fontes, classificacoes, itens, subitens, niveis1, niveis2, niveis3 };
        }

        // ============================================
        // FUNÇÕES PARA DADOS DO GRÁFICO DE EVOLUÇÃO ANUAL
        // ============================================
        function getDadosEvolucaoAnual() {
            const anos = ['2022', '2023', '2024', '2025', '2026'];
            const dados = {
                previstoInicial: [],
                previstoAtualizado: [],
                contabilizado: []
            };
            
            anos.forEach(ano => {
                const dadosAno = dadosCompletos.filter(item => item.ano_de_exercicio == ano);
                
                const totalPrevistoInicial = dadosAno.reduce((acc, item) => acc + (item.valor_previsto_inicial || 0), 0);
                const totalPrevistoAtualizado = dadosAno.reduce((acc, item) => acc + (item.valor_previsto_atualizado || 0), 0);
                const totalContabilizado = dadosAno.reduce((acc, item) => acc + (item.valor_contabilizado || 0), 0);
                
                dados.previstoInicial.push(totalPrevistoInicial);
                dados.previstoAtualizado.push(totalPrevistoAtualizado);
                dados.contabilizado.push(totalContabilizado);
            });
            
            return { anos, dados };
        }

        // ============================================
        // VISÃO GERAL (Apenas Órgãos - UM POR LINHA)
        // ============================================
        function renderizarVisaoGeral() {
            const container = document.getElementById('visao-geral-content');
            if (!container) return;
            
            const opcoes = getOpcoesFiltro();
            
            let dadosFiltrados = aplicarFiltros(dadosCompletos, filtrosGeral);
            dadosFiltrados = aplicarBusca(dadosFiltrados, buscaGeral, ['unidade_orcamentaria_nome']);
            
            // AGRUPAMENTO CORRETO POR ÓRGÃO
            const orgaosMap = new Map();
            
            dadosFiltrados.forEach(item => {
                const nomeOrgao = item.unidade_orcamentaria_nome;
                if (!nomeOrgao) return;
                
                if (!orgaosMap.has(nomeOrgao)) {
                    orgaosMap.set(nomeOrgao, {
                        orgao: nomeOrgao,
                        totalPrevisto: 0,
                        totalPrevistoAtualizado: 0,
                        totalContabilizado: 0,
                        registros: []
                    });
                }
                
                const orgao = orgaosMap.get(nomeOrgao);
                orgao.totalPrevisto += item.valor_previsto_inicial || 0;
                orgao.totalPrevistoAtualizado += item.valor_previsto_atualizado || 0;
                orgao.totalContabilizado += item.valor_contabilizado || 0;
                orgao.registros.push(item);
            });
            
            let dadosTabela = Array.from(orgaosMap.values());
            
            // Calcular totais gerais
            const totalPrevistoGeral = dadosTabela.reduce((acc, i) => acc + i.totalPrevisto, 0);
            const totalPrevistoAtualizadoGeral = dadosTabela.reduce((acc, i) => acc + i.totalPrevistoAtualizado, 0);
            const totalContabilizadoGeral = dadosTabela.reduce((acc, i) => acc + i.totalContabilizado, 0);
            const percentualGeral = calcularPercentual(totalContabilizadoGeral, totalPrevistoGeral);
            
            // Dados para o gráfico de evolução anual
            const dadosEvolucao = getDadosEvolucaoAnual();
            
            // Ordenação
            dadosTabela.sort((a, b) => {
                let valA, valB;
                switch(ordenacaoGeral.coluna) {
                    case 'orgao':
                        valA = a.orgao || '';
                        valB = b.orgao || '';
                        break;
                    case 'previsto':
                        valA = a.totalPrevisto;
                        valB = b.totalPrevisto;
                        break;
                    case 'previstoAtualizado':
                        valA = a.totalPrevistoAtualizado;
                        valB = b.totalPrevistoAtualizado;
                        break;
                    case 'contabilizado':
                        valA = a.totalContabilizado;
                        valB = b.totalContabilizado;
                        break;
                    case 'percentual':
                        valA = (a.totalContabilizado / a.totalPrevisto) || 0;
                        valB = (b.totalContabilizado / b.totalPrevisto) || 0;
                        break;
                    default:
                        valA = a.orgao || '';
                        valB = b.orgao || '';
                }
                
                if (ordenacaoGeral.direcao === 'asc') {
                    return valA > valB ? 1 : -1;
                } else {
                    return valA < valB ? 1 : -1;
                }
            });
            
            const totalRegistros = dadosTabela.length;
            const totalPaginas = Math.ceil(totalRegistros / itensPorPagina);
            const inicio = (paginaAtual.geral - 1) * itensPorPagina;
            const dadosPagina = dadosTabela.slice(inicio, inicio + itensPorPagina);
            
            let html = `
                <div class="filter-container">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="filter-label"><i class="material-icons">calendar_today</i>Ano</label>
                            <select class="form-select" id="filtroAnoGeral">
                                <option value="">Selecione um ano</option>
                                ${opcoes.anos.map(a => `<option value="${a}" ${filtrosGeral.ano === a ? 'selected' : ''}>${a}</option>`).join('')}
                            </select>
                        </div>
                        <div class="col-md-8 d-flex align-items-end justify-content-end gap-2">
                            <button class="btn-search" onclick="aplicarFiltrosGeral()">
                                <i class="material-icons">search</i> Pesquisar
                            </button>
                            <button class="btn-secondary-custom" onclick="limparFiltrosGeral()">
                                <i class="material-icons me-2">clear</i>Limpar filtros
                            </button>
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="metric-card">
                            <div class="metric-label">Previsto Inicial</div>
                            <div class="metric-value">${formatarMoeda(totalPrevistoGeral)}</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="metric-card">
                            <div class="metric-label">Previsto Atualizado</div>
                            <div class="metric-value">${formatarMoeda(totalPrevistoAtualizadoGeral)}</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="metric-card">
                            <div class="metric-label">Contabilizado</div>
                            <div class="metric-value">${formatarMoeda(totalContabilizadoGeral)}</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="metric-card">
                            <div class="metric-label">% Arrecadação</div>
                            <div class="metric-value">${percentualGeral}%</div>
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-12">
                        <div class="chart-container">
                            <div class="chart-header">
                                <h4 class="chart-title">Evolução Anual da Receita (2022-2026)</h4>
                            </div>
                            <div class="chart-wrapper">
                                <canvas id="chartEvolucaoAnual"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-bar">
                    <div class="d-flex align-items-center">
                        <span class="table-badge">Total de registros: ${totalRegistros.toLocaleString('pt-BR')}</span>
                    </div>
                    <div class="action-group">
                        <input type="text" class="search-box" id="buscaGeral" placeholder="Buscar órgão..." value="${buscaGeral}" onkeyup="buscaGeralChange(this.value)">
                        <button class="btn-export" onclick="exportarGeralCSV()"><i class="material-icons me-2">description</i>CSV</button>
                        <button class="btn-export" onclick="exportarGeralPDF()"><i class="material-icons me-2">print</i>PDF</button>
                        <div class="share-dropdown">
                            <button class="btn-export" onclick="toggleShare('geral')"><i class="material-icons me-2">share</i>Compartilhar</button>
                            <div class="share-options" id="shareOptions-geral">
                                <a href="#" onclick="copiarLink(event, 'geral')"><i class="fas fa-link"></i> Copiar Link</a>
                                <a href="#" onclick="compartilharFacebook(event, 'geral')"><i class="fab fa-facebook-f"></i> Facebook</a>
                                <a href="#" onclick="compartilharTwitter(event, 'geral')"><i class="fab fa-twitter"></i> Twitter</a>
                                <a href="#" onclick="compartilharLinkedIn(event, 'geral')"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
                                <a href="#" onclick="compartilharWhatsApp(event, 'geral')"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-fixed-header-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th onclick="ordenarGeral('orgao')" class="sortable ${ordenacaoGeral.coluna === 'orgao' ? ordenacaoGeral.direcao : ''}">Órgão</th>
                                    <th onclick="ordenarGeral('previsto')" class="sortable text-right ${ordenacaoGeral.coluna === 'previsto' ? ordenacaoGeral.direcao : ''}">Previsto Inicial</th>
                                    <th onclick="ordenarGeral('previstoAtualizado')" class="sortable text-right ${ordenacaoGeral.coluna === 'previstoAtualizado' ? ordenacaoGeral.direcao : ''}">Previsto Atualizado</th>
                                    <th onclick="ordenarGeral('contabilizado')" class="sortable text-right ${ordenacaoGeral.coluna === 'contabilizado' ? ordenacaoGeral.direcao : ''}">Contabilizado</th>
                                    <th onclick="ordenarGeral('percentual')" class="sortable text-center ${ordenacaoGeral.coluna === 'percentual' ? ordenacaoGeral.direcao : ''}">% Arrecadação</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${gerarLinhasTabelaGeral(dadosPagina)}
                            </tbody>
                            <tfoot class="table-footer">
                                <tr>
                                    <td class="fw-bold">TOTAL GERAL</td>
                                    <td class="text-right fw-bold">${formatarMoeda(totalPrevistoGeral)}</td>
                                    <td class="text-right fw-bold">${formatarMoeda(totalPrevistoAtualizadoGeral)}</td>
                                    <td class="text-right fw-bold">${formatarMoeda(totalContabilizadoGeral)}</td>
                                    <td class="text-center fw-bold">${percentualGeral}%</td>
                                    <td></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>

        function criarGraficoEvolucaoAnual(dadosEvolucao) {
            const canvas = document.getElementById('chartEvolucaoAnual');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            Chart.getChart(ctx)?.destroy();
            
            new Chart(ctx, {
                type: 'line',
                data: { 
                    labels: dadosEvolucao.anos,
                    datasets: [
                        {
                            label: 'Previsto Inicial',
                            data: dadosEvolucao.dados.previstoInicial,
                            borderColor: '#1a3a5c',
                            backgroundColor: 'rgba(26, 58, 92, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#1a3a5c',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            tension: 0.1
                        },
                        {
                            label: 'Previsto Atualizado',

                            borderColor: '#ffc107',
                            backgroundColor: 'rgba(255, 193, 7, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#ffc107',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            tension: 0.1
                        },
                        {
                            label: 'Contabilizado',
                            data: dadosEvolucao.dados.contabilizado,
                            borderColor: '#28a745',
                            backgroundColor: 'rgba(40, 167, 69, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#28a745',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            tension: 0.1
                        }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { 
                        tooltip: { 
                            callbacks: { 
                                label: (ctx) => {
                                    const label = ctx.dataset.label || '';
                                    const valor = formatarMoeda(ctx.raw);
                                    return `${label}: ${valor}`;
                                }
                            } 
                        },
                        legend: {
                            position: 'bottom',
                            labels: {
                                usePointStyle: true,
                                boxWidth: 10,
                                font: {
                                    size: 11
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: value => formatarMoeda(value).replace('R$', 'R$ ')
                            }
                        }
                    }
                }
            });
        }

        function gerarLinhasTabelaGeral(dados) {
            if (!dados || dados.length === 0) {
                return '<tr><td colspan="6" class="text-center py-4">Nenhum dado encontrado</td></tr>';
            }
            
            return dados.map(item => {
                const percentual = calcularPercentual(item.totalContabilizado, item.totalPrevisto);
                return `<tr>
                    <td class="orgao-cell"><a href="#" class="orgao-link" onclick="irParaDetalhamento('${item.orgao.replace(/'/g, "\\'")}')">${item.orgao}</a></td>
                    <td class="text-right">${formatarMoeda(item.totalPrevisto)}</td>
                    <td class="text-right">${formatarMoeda(item.totalPrevistoAtualizado)}</td>
                    <td class="text-right">${formatarMoeda(item.totalContabilizado)}</td>
                    <td class="text-center">
                        <span class="badge ${parseFloat(percentual) >= 100 ? 'bg-success' : parseFloat(percentual) >= 90 ? 'bg-warning' : 'bg-danger'} text-white px-2 py-1">
                            ${percentual}%
                        </span>
                    </td>
                    <td class="text-center">

        window.irParaDetalhamento = function(orgao) {
            document.getElementById('detalhamento-tab').click();
            setTimeout(() => {
                const selectOrgao = document.getElementById('filtroOrgaoDetalhamento');
                if (selectOrgao) {
                    selectOrgao.value = orgao;
                    filtrosDetalhamento.orgao = orgao;
                }
                renderizarDetalhamento();
            }, 300);
        };

        window.aplicarFiltrosGeral = function() {
            const ano = document.getElementById('filtroAnoGeral')?.value;
            filtrosGeral.ano = ano || '';
            buscaGeral = document.getElementById('buscaGeral')?.value || '';
            paginaAtual.geral = 1;
            renderizarVisaoGeral();
        };

        window.buscaGeralChange = function(valor) {
            debounceBusca('geral', valor, (v) => {
                buscaGeral = v;
                paginaAtual.geral = 1;
                renderizarVisaoGeral();
            }, 500);
        };

        window.limparFiltrosGeral = function() {
            const anos = [...new Set(dadosCompletos.map(i => i.ano_de_exercicio))].filter(Boolean).sort();
            filtrosGeral = { ano: anos.length > 0 ? anos[anos.length - 1] : '' };
            buscaGeral = '';
            paginaAtual.geral = 1;
            renderizarVisaoGeral();
        };

        window.ordenarGeral = function(coluna) {
            if (ordenacaoGeral.coluna === coluna) {
                ordenacaoGeral.direcao = ordenacaoGeral.direcao === 'asc' ? 'desc' : 'asc';
            } else {
                ordenacaoGeral.coluna = coluna;
                ordenacaoGeral.direcao = 'asc';
            }
            renderizarVisaoGeral();
        };

        window.mudarPaginaGeral = function(pagina) {
            paginaAtual.geral = pagina;
            renderizarVisaoGeral();
        };

        // FUNÇÕES DE CONTROLE DE COLUNAS
        // ============================================
        window.toggleColuna = function(coluna) {
            colunasVisiveis[coluna] = !colunasVisiveis[coluna];
            renderizarDetalhamento();
        };

        window.toggleCodigos = function() {
            mostrarCodigos = !mostrarCodigos;
            renderizarDetalhamento();
        };

        window.toggleTodasColunas = function() {
            // Verifica se todas as colunas estão marcadas
            const todasMarcadas = Object.values(colunasVisiveis).every(valor => valor === true);
            
            // Se todas estão marcadas, desmarca todas. Senão, marca todas
            const novoValor = !todasMarcadas;
            
            colunasVisiveis = {
                orgao: novoValor,
                classificacao: novoValor,
                categoria: novoValor,
                fonte: novoValor,
                origem: novoValor,
                especie: novoValor,
                nivel1: novoValor,
                nivel2: novoValor,
                nivel3: novoValor,
                item: novoValor,
                subitem: novoValor
            };
            
            renderizarDetalhamento();
        };

                'unidade_orcamentaria_nome', 'classificacao_receita_formatado', 'categoria_receita_descricao',
                'origem_receita_descricao', 'especie_receita_descricao', 'tipo_receita_descricao',
                'fonte_recurso_descricao', 'item_receita_descricao', 'subitem_receita_descricao',

            const totalPrevistoAtualizadoGeral = dadosFiltrados.reduce((acc, i) => acc + (i.valor_previsto_atualizado || 0), 0);
            const totalContabilizadoGeral = dadosFiltrados.reduce((acc, i) => acc + (i.valor_contabilizado || 0), 0);
            const percentualGeral = calcularPercentual(totalContabilizadoGeral, totalPrevistoGeral);
            
            // Ordenação
            dadosFiltrados.sort((a, b) => {
                let valA, valB;
                switch(ordenacaoDetalhamento.coluna) {
                    case 'orgao':
                        valA = a.unidade_orcamentaria_nome || '';
                        valB = b.unidade_orcamentaria_nome || '';
                        break;
                    case 'classificacao':

                        valB = b.classificacao_receita_formatado || '';
                        break;
                    case 'categoria':
                        valA = a.categoria_receita_descricao || '';
                        valB = b.categoria_receita_descricao || '';
                        break;
                    case 'fonte':
                        valA = a.fonte_recurso_descricao || '';
                        valB = b.fonte_recurso_descricao || '';
                        break;
                    case 'origem':
                        valA = a.origem_receita_descricao || '';
                        valB = b.origem_receita_descricao || '';
                        break;
                    case 'especie':
                        valA = a.especie_receita_descricao || '';
                        valB = b.especie_receita_descricao || '';
                        break;
                    case 'tipo':

                        valB = b.tipo_receita_descricao || '';
                        break;
                    case 'nivel1':

                        valB = b.nivel_1_desdobramento_descricao || '';
                        break;
                    case 'nivel2':

                        valB = b.nivel_2_desdobramento_descricao || '';
                        break;
                    case 'nivel3':

                        valB = b.nivel_3_desdobramento_descricao || '';
                        break;
                    case 'item':
                        valA = a.item_receita_descricao || '';
                        valB = b.item_receita_descricao || '';
                        break;
                    case 'subitem':
                        valA = a.subitem_receita_descricao || '';
                        valB = b.subitem_receita_descricao || '';
                        break;
                    case 'previsto':
                        valA = a.valor_previsto_inicial || 0;
                        valB = b.valor_previsto_inicial || 0;
                        break;
                    case 'previstoAtualizado':
                        valA = a.valor_previsto_atualizado || 0;
                        valB = b.valor_previsto_atualizado || 0;
                        break;
                    case 'contabilizado':
                        valA = a.valor_contabilizado || 0;
                        valB = b.valor_contabilizado || 0;
                        break;
                    case 'percentual':
                        valA = (a.valor_contabilizado / a.valor_previsto_inicial) || 0;
                        valB = (b.valor_contabilizado / b.valor_previsto_inicial) || 0;
                        break;
                    default:
                        valA = a.unidade_orcamentaria_nome || '';
                        valB = b.unidade_orcamentaria_nome || '';
                }
                
                if (ordenacaoDetalhamento.direcao === 'asc') {
                    return valA > valB ? 1 : -1;
                } else {
                    return valA < valB ? 1 : -1;
                }

            const totalRegistros = dadosFiltrados.length;

        function exportarParaCSV(dados, nomeArquivo, cabecalhos, mapeamento) {
            const linhas = dados.map(item => 
                mapeamento.map(campo => {
                    let valor = item[campo];
                    if (typeof valor === 'number') {
                        valor = formatarNumero(valor);
                    }
                    return `"${String(valor || '').replace(/"/g, '""')}"`;
                }).join(';')
            );
            
            const csv = [cabecalhos.join(';'), ...linhas].join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = nomeArquivo;
            link.click();
        }

        function exportarParaPDF(dados, titulo, colunas, mapeamento, nomeArquivo) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape' });
            
            const dataAtual = new Date().toLocaleString('pt-BR');
            
            doc.setFontSize(16);
            doc.setTextColor(26, 58, 92);
            doc.text(titulo, 14, 15);
            
            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);
            doc.text(`Emitido em: ${dataAtual}`, 14, 22);
            doc.text('Fonte: Portal da Transparência - Acordo Judicial de Brumadinho', 14, 27);
            
            const body = dados.map(item => 
                mapeamento.map(campo => {
                    let valor = item[campo];
                    if (typeof valor === 'number') {
                        valor = formatarMoeda(valor);
                    }
                    return valor || '';
                })
            );
            
            doc.autoTable({
                startY: 32,
                head: [colunas],
                body: body,
                didDrawPage: (data) => {
                    doc.setFontSize(8);
                    doc.setTextColor(150, 150, 150);
                    doc.text(`Página ${data.pageNumber}`, 14, doc.internal.pageSize.height - 5);
                }
            });
            
            doc.save(nomeArquivo);
        }

            let dadosFiltrados = aplicarFiltros(dadosCompletos, filtrosGeral);

            const orgaosMap = new Map();
            dadosFiltrados.forEach(item => {
                const nomeOrgao = item.unidade_orcamentaria_nome;
                if (!nomeOrgao) return;
                
                if (!orgaosMap.has(nomeOrgao)) {
                    orgaosMap.set(nomeOrgao, {
                        orgao: nomeOrgao,
                        previsto: 0,
                        previstoAtualizado: 0,
                        contabilizado: 0
                    });
                }
                
                const orgao = orgaosMap.get(nomeOrgao);
                orgao.previsto += item.valor_previsto_inicial || 0;
                orgao.previstoAtualizado += item.valor_previsto_atualizado || 0;
                orgao.contabilizado += item.valor_contabilizado || 0;

            const dados = Array.from(orgaosMap.values());
            const cabecalhos = ['Órgão', 'Previsto Inicial', 'Previsto Atualizado', 'Contabilizado', '% Arrecadação'];
            const mapeamento = ['orgao', 'previsto', 'previstoAtualizado', 'contabilizado'];
            
            exportarParaCSV(dados, 'visao_geral.csv', cabecalhos, mapeamento);
        };
