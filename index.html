<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receita Pública - Acordo Judicial de Brumadinho</title>
    
    <!-- ==================== ESTILOS E BIBLIOTECAS ==================== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        :root {
            --primary-dark: #1a3a5c;
            --primary-darker: #0f2a44;
            --accent-red: #b93c42;
            --accent-bright: #db233f;
            --background-light: #f5f7fa;
            --success-green: #28a745;
            --warning-yellow: #ffc107;
            --info-blue: #17a2b8;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--background-light);
            padding-bottom: 15px;
            overflow: visible !important;
        }

        html { overflow: visible !important; }

        /* ==================== DATA ATUALIZAÇÃO ==================== */
        .data-atualizacao-container {
            display: flex;
            justify-content: left;
            align-items: center;
            margin: 20px 0;
        }
        
        .data-atualizacao-box {
            background: white;
            border-radius: 8px;
            padding: 8px 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: 600;
        }
        
        .data-atualizacao-box i {
            font-size: 14px;
            color: var(--accent-red);
        }

        /* ==================== FILTROS ==================== */
        .filter-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-red);
        }
        
        .filter-label {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 6px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .filter-label i { font-size: 18px; color: var(--accent-red); }
        
        .form-control, .form-select {
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            height: 42px;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--accent-red);
            box-shadow: 0 0 0 2px rgba(185, 60, 66, 0.15);
        }

        /* ==================== CARDS DE MÉTRICAS ==================== */
        .metric-card {
            background: white;
            border-radius: 10px;
            padding: 15px 12px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            border-top: 4px solid var(--primary-dark);
            transition: all 0.3s ease;
            height: 100%;
        }
        
        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        }
        
        .metric-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 5px 0;
            line-height: 1.2;
            word-break: break-word;
        }
        
        .metric-label {
            font-size: 13px;
            color: var(--primary-darker);
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ==================== CONTAINER DE GRÁFICOS ==================== */
        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            height: 100%;
            min-height: 320px;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--background-light);
        }
        
        .chart-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary-dark);
            margin: 0;
        }
        
        .chart-wrapper {
            position: relative;
            height: 240px;
            width: 100%;
        }

        /* ==================== TABELAS ==================== */
        .table-container {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }
        
        .table-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .table-title {
            font-size: 15px;
            font-weight: 600;
            margin: 0;
        }
        
        .table-badge {
            background: var(--accent-red);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 600;
        }
        
        .table-fixed-header-container {
            position: relative;
            max-height: 500px;
            overflow: auto;
        }
        
        .table-fixed-header-container table thead th {
            background-color: var(--primary-dark) !important;
            color: white !important;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            padding: 12px 8px;
            font-size: 13px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .table {
            width: 100%;
            font-size: 13px;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        .table tbody td {
            padding: 10px 8px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f1f1;
        }
        
        .table tbody tr:hover {
            background-color: rgba(26, 58, 92, 0.04);
        }

        .text-right { text-align: right; }
        .text-center { text-align: center; }

        .orgao-link, .categoria-link {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .orgao-link:hover, .categoria-link:hover { 
            color: var(--accent-red); 
        }

        .badge-categoria {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-corrente { background-color: #e3f2fd; color: #0d47a1; }
        .badge-capital { background-color: #fce4ec; color: #880e4f; }
        .badge-intra { background-color: #e8f5e9; color: #1b5e20; }
        .badge-outros { background-color: #f5f5f5; color: #616161; }

        /* ==================== BOTÕES ==================== */
        .btn-primary-custom {
            background: linear-gradient(to right, var(--primary-darker), var(--primary-dark));
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 14px;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            height: 42px;
        }
        .btn-primary-custom:hover {
            background: linear-gradient(to right, var(--accent-red), #a32c32);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(185, 60, 66, 0.2);
            color: white;
        }
        
        .btn-secondary-custom {
            background: white;
            border: 2px solid var(--primary-darker);
            color: var(--primary-darker);
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            height: 42px;
        }
        .btn-secondary-custom:hover {
            background-color: var(--primary-darker);
            color: white;
            transform: translateY(-1px);
        }
        
        .btn-export {
            background: white;
            border: 2px solid var(--primary-darker);
            color: var(--primary-darker);
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            height: 38px;
        }
        .btn-export:hover {
            background: var(--primary-darker);
            color: white;
            transform: translateY(-1px);
        }

        .btn-action {
            padding: 6px;
            border-radius: 4px;
            border: none;
            background-color: var(--primary-dark);
            color: white;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-action:hover { background-color: var(--accent-red); }

        .btn-search {
            background: var(--accent-red);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            height: 38px;
        }
        .btn-search:hover {
            background: #a32c32;
            transform: translateY(-1px);
        }

        /* ==================== BOTÃO COMPARTILHAR ==================== */
        .share-dropdown {
            position: relative;
            display: inline-block;
        }
        
        .share-options {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background-color: white;
            min-width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 8px;
            z-index: 1000;
            border: 1px solid #dee2e6;
            margin-top: 5px;
        }
        
        .share-options.show { display: block; }
        
        .share-options a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            color: var(--primary-dark);
            transition: background 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .share-options a:hover { background-color: var(--background-light); color: var(--accent-red); }
        .share-options a i { font-size: 18px; width: 20px; text-align: center; }

        /* ==================== NAVEGAÇÃO ==================== */
        .nav-tabs-container {
            background: white;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
            overflow-x: auto;
        }
        .nav-tabs { border: none !important; gap: 4px; flex-wrap: nowrap; }
        .nav-tabs .nav-link {
            border: none !important;
            border-radius: 6px !important;
            padding: 10px 15px !important;
            font-weight: 600;
            color: var(--primary-dark) !important;
            font-size: 16px;
            white-space: nowrap;
            display: inline-flex !important;
            align-items: center;
        }
        .nav-tabs .nav-link:hover { background-color: rgba(26, 58, 92, 0.05) !important; color: var(--accent-red) !important; }
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%) !important;
            color: white !important;
        }
        .nav-tabs .nav-link .material-icons { font-size: 18px !important; margin-right: 8px !important; }

        /* ==================== MODAL ==================== */
        .modal-creative .modal-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white;
            padding: 20px 30px;
            border-bottom: none;
        }
        .modal-creative .modal-body { padding: 30px; background: #f8fafc; }
        
        .modal-ano {
            font-size: 14px;
            color: var(--accent-red);
            margin-bottom: 5px;
        }
        
        .modal-orgao {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-red);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent-red);
        }
        
        .modal-categoria-box {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .modal-categoria-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #6c757d;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .modal-categoria-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-dark);
        }
        
        .modal-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .modal-grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .modal-info-box {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .modal-subtitle {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 20px 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .modal-item-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 4px solid var(--accent-red);
        }
        
        .modal-item-descricao {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .modal-item-detalhes {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #6c757d;
        }
        
        .modal-item-detalhes span {
            background: #f8f9fa;
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .modal-item-valores {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            font-size: 14px;
            border-top: 1px dashed #dee2e6;
            padding-top: 10px;
        }
        
        .modal-item-previsto {
            color: #6c757d;
        }
        
        .modal-item-contabilizado {
            font-weight: 700;
            color: var(--accent-red);
        }

        /* ==================== PAGINAÇÃO ==================== */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #dee2e6;
        }
        
        .pagination-info {
            font-size: 13px;
            color: #6c757d;
        }
        
        .pagination .page-link {
            color: var(--primary-dark);
            border-color: #dee2e6;
        }
        .pagination .page-link:hover {
            color: var(--accent-red);
            background-color: #f8f9fa;
            border-color: #dee2e6;
        }
        .pagination .page-item.active .page-link {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
            color: white;
        }
        
        .items-per-page {
            width: 70px;
            border: 2px solid var(--primary-dark) !important;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            background-color: white;
            color: var(--primary-dark);
            font-weight: 600;
            cursor: pointer;
        }
        
        .search-box {
            border: 2px solid var(--primary-dark) !important;
            border-radius: 6px !important;
            padding: 8px 12px !important;
            font-size: 13px !important;
            background-color: white;
            color: var(--primary-dark);
            height: 38px;
        }
        .search-box:focus {
            border-color: var(--accent-red) !important;
            box-shadow: 0 0 0 2px rgba(185, 60, 66, 0.15);
            outline: none;
        }

        /* ==================== ORDENAÇÃO ==================== */
        .sortable {
            cursor: pointer;
            position: relative;
            padding-right: 20px !important;
        }
        .sortable:after {
            content: '↕️';
            position: absolute;
            right: 5px;
            opacity: 0.3;
            font-size: 12px;
        }
        .sortable.asc:after {
            content: '↑';
            opacity: 1;
        }
        .sortable.desc:after {
            content: '↓';
            opacity: 1;
        }

        /* ==================== METADADOS ==================== */
        .metadata-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid var(--info-blue);
        }
        
        .metadata-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .metadata-table th {
            background-color: var(--primary-dark);
            color: white;
            padding: 10px;
            text-align: left;
            font-weight: 600;
        }
        
        .metadata-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .metadata-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        
        .metadata-table td:first-child {
            font-weight: 600;
            color: var(--primary-dark);
        }
        
        .tipo-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .tipo-texto { background-color: #e3f2fd; color: #0d47a1; }
        .tipo-numero { background-color: #fce4ec; color: #880e4f; }
        .tipo-data { background-color: #e8f5e9; color: #1b5e20; }

        /* ==================== RODAPÉ DA TABELA ==================== */
        .table-footer {
            background-color: #f8f9fa;
            font-weight: 700;
            border-top: 2px solid var(--primary-dark);
        }
        .table-footer td {
            padding: 12px 10px !important;
            background-color: #f8f9fa;
        }

        /* ==================== ACTION BAR ==================== */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .action-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="container dashboard-spacing">
            <!-- ==================== MENU DE NAVEGAÇÃO ==================== -->
            <div class="nav-tabs-container">
                <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
                    <li class="nav-item"><button class="nav-link active" id="visao-geral-tab" data-bs-toggle="tab" data-bs-target="#visao-geral"><i class="material-icons">bar_chart</i>Visão Geral</button></li>
                    <li class="nav-item"><button class="nav-link" id="categoria-tab" data-bs-toggle="tab" data-bs-target="#categoria"><i class="material-icons">category</i>Categoria</button></li>
                    <li class="nav-item"><button class="nav-link" id="origem-tab" data-bs-toggle="tab" data-bs-target="#origem"><i class="material-icons">source</i>Origem</button></li>
                    <li class="nav-item"><button class="nav-link" id="classificacao-tab" data-bs-toggle="tab" data-bs-target="#classificacao"><i class="material-icons">class</i>Classificação Orçamentária</button></li>
                    <li class="nav-item"><button class="nav-link" id="downloads-tab" data-bs-toggle="tab" data-bs-target="#downloads"><i class="material-icons">download</i>Downloads</button></li>
                </ul>
            </div>

            <!-- ==================== DATA DE ATUALIZAÇÃO ==================== -->
            <div class="data-atualizacao-container">
                <div class="data-atualizacao-box">
                    <i class="material-icons">update</i> Atualizado em: <span id="data-atualizacao-header">Carregando...</span>
                </div>
            </div>

            <!-- ==================== CONTEÚDO DAS ABAS ==================== -->
            <div class="tab-content" id="dashboardTabsContent">
                <!-- ABA 1: VISÃO GERAL -->
                <div class="tab-pane fade show active" id="visao-geral" role="tabpanel">
                    <div id="visao-geral-content"></div>
                </div>
                <!-- ABA 2: CATEGORIA -->
                <div class="tab-pane fade" id="categoria" role="tabpanel">
                    <div id="categoria-content"></div>
                </div>
                <!-- ABA 3: ORIGEM -->
                <div class="tab-pane fade" id="origem" role="tabpanel">
                    <div id="origem-content"></div>
                </div>
                <!-- ABA 4: CLASSIFICAÇÃO ORÇAMENTÁRIA -->
                <div class="tab-pane fade" id="classificacao" role="tabpanel">
                    <div id="classificacao-content"></div>
                </div>
                <!-- ABA 5: DOWNLOADS -->
                <div class="tab-pane fade" id="downloads" role="tabpanel">
                    <div id="downloads-content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== MODAL DE DETALHES ==================== -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content modal-creative">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="material-icons me-2">receipt</i> Detalhamento da Receita</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary-custom" data-bs-dismiss="modal"><i class="material-icons me-2">close</i>Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== LOADING OVERLAY ==================== -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction: column;">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="text-primary fw-bold mt-3">Carregando dados de receita 2022-2026...</div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ============================================
        // CONFIGURAÇÕES E VARIÁVEIS GLOBAIS
        // ============================================
        // URLs corrigidas para os arquivos raw do GitHub
        const RECEITA_URLS = [
            'https://raw.githubusercontent.com/transparencia-mg/portal_receita/main/dataset/data/receita_2022.csv',
            'https://raw.githubusercontent.com/transparencia-mg/portal_receita/main/dataset/data/receita_2023.csv',
            'https://raw.githubusercontent.com/transparencia-mg/portal_receita/main/dataset/data/receita_2024.csv',
            'https://raw.githubusercontent.com/transparencia-mg/portal_receita/main/dataset/data/receita_2025.csv',
            'https://raw.githubusercontent.com/transparencia-mg/portal_receita/main/dataset/data/receita_2026.csv'
        ];
        
        let dadosCompletos = [];
        
        // Estado das abas
        let filtrosGeral = { ano: '', orgao: '', categoria: '' };
        let filtrosCategoria = { ano: '', orgao: '', categoria: '', origem: '', especie: '', tipo: '' };
        let filtrosOrigem = { ano: '', orgao: '', categoria: '', origem: '', especie: '', tipo: '', item: '', subitem: '', nivel1: '', nivel2: '', nivel3: '' };
        let filtrosClassificacao = { ano: '', orgao: '', classificacao: '' };
        
        // Busca textual
        let buscaGeral = '';
        let buscaCategoria = '';
        let buscaOrigem = '';
        let buscaClassificacao = '';
        
        // Paginação
        let paginaAtual = { geral: 1, categoria: 1, origem: 1, classificacao: 1 };
        let itensPorPagina = 50;
        
        // Ordenação
        let ordenacaoGeral = { coluna: 'orgao', direcao: 'asc' };
        let ordenacaoCategoria = { coluna: 'orgao', direcao: 'asc' };
        let ordenacaoOrigem = { coluna: 'origem', direcao: 'asc' };
        let ordenacaoClassificacao = { coluna: 'orgao', direcao: 'asc' };

        // ============================================
        // FUNÇÕES DE INICIALIZAÇÃO
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            setupAtualizacaoData();
            setupEventListeners();
            carregarDados();
        });

        function setupAtualizacaoData() {
            const now = new Date();
            const dataFormatada = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR');
            document.getElementById('data-atualizacao-header').textContent = dataFormatada;
        }

        function setupEventListeners() {
            window.addEventListener('click', (e) => {
                if (!e.target.closest('.share-dropdown')) {
                    document.querySelectorAll('.share-options').forEach(opt => opt.classList.remove('show'));
                }
            });
        }

        function mostrarLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function showError(message) {
            const container = document.querySelector('.main-container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'alert alert-danger alert-dismissible fade show';
            errorDiv.innerHTML = `
                <i class="material-icons me-2" style="vertical-align: middle;">warning</i>
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            container.prepend(errorDiv);
            setTimeout(() => errorDiv.remove(), 5000);
        }

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        function formatarMoeda(valor) {
            if (!valor && valor !== 0) return 'R$ 0,00';
            const valorNum = typeof valor === 'string' ? parseFloat(valor.replace(',', '.')) : valor;
            return valorNum.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 });
        }

        function calcularPercentual(contabilizado, previsto) {
            if (!previsto || previsto === 0) return '0,0';
            return ((contabilizado / previsto) * 100).toFixed(1);
        }

        function getCategoriaBadgeClass(categoria) {
            if (!categoria) return 'badge-outros';
            const cat = categoria.toLowerCase();
            if (cat.includes('corrente')) return 'badge-corrente';
            if (cat.includes('capital')) return 'badge-capital';
            if (cat.includes('intra')) return 'badge-intra';
            return 'badge-outros';
        }

        function parseCSV(texto) {
            const linhas = texto.trim().split('\n');
            const cabecalhos = linhas[0].split(';').map(h => h.trim().replace(/^["']|["']$/g, ''));
            const dados = [];
            
            for (let i = 1; i < linhas.length; i++) {
                if (!linhas[i].trim()) continue;
                
                const valores = [];
                let campoAtual = '';
                let dentroAspas = false;
                
                for (let char of linhas[i]) {
                    if (char === '"') {
                        dentroAspas = !dentroAspas;
                    } else if (char === ';' && !dentroAspas) {
                        valores.push(campoAtual);
                        campoAtual = '';
                    } else {
                        campoAtual += char;
                    }
                }
                valores.push(campoAtual);
                
                const linha = {};
                cabecalhos.forEach((cab, idx) => {
                    let valor = valores[idx] || '';
                    valor = valor.replace(/^["']|["']$/g, '');
                    
                    // Converter valores numéricos (usando vírgula como separador decimal)
                    if (cab.includes('valor') || cab.includes('previsto') || cab.includes('contabilizado')) {
                        valor = parseFloat(valor.replace(',', '.')) || 0;
                    }
                    
                    linha[cab] = valor;
                });
                
                dados.push(linha);
            }
            
            return dados;
        }

        function aplicarFiltros(dados, filtros) {
            return dados.filter(item => {
                for (let [key, value] of Object.entries(filtros)) {
                    if (!value) continue;
                    
                    switch(key) {
                        case 'ano':
                            if (item.ano_de_exercicio != value) return false;
                            break;
                        case 'orgao':
                            if (item.unidade_orcamentaria_nome !== value) return false;
                            break;
                        case 'categoria':
                            if (item.categoria_receita_descricao !== value) return false;
                            break;
                        case 'origem':
                            if (item.origem_receita_descricao !== value) return false;
                            break;
                        case 'especie':
                            if (item.especie_receita_descricao !== value) return false;
                            break;
                        case 'tipo':
                            if (item.tipo_receita_descricao !== value) return false;
                            break;
                        case 'item':
                            if (item.item_receita_descricao !== value) return false;
                            break;
                        case 'subitem':
                            if (item.subitem_receita_descricao !== value) return false;
                            break;
                        case 'nivel1':
                            if (item.nivel_1_desdobramento_descricao !== value) return false;
                            break;
                        case 'nivel2':
                            if (item.nivel_2_desdobramento_descricao !== value) return false;
                            break;
                        case 'nivel3':
                            if (item.nivel_3_desdobramento_descricao !== value) return false;
                            break;
                        case 'classificacao':
                            if (item.classificacao_receita_formatado !== value) return false;
                            break;
                    }
                }
                return true;
            });
        }

        function aplicarBusca(dados, termo, campos) {
            if (!termo) return dados;
            
            termo = termo.toLowerCase();
            return dados.filter(item => {
                return campos.some(campo => {
                    const valor = item[campo];
                    return valor && valor.toString().toLowerCase().includes(termo);
                });
            });
        }

        // ============================================
        // CARREGAMENTO DE DADOS
        // ============================================
        async function carregarDados() {
            mostrarLoading(true);
            try {
                const promises = RECEITA_URLS.map(url => 
                    fetch(url)
                        .then(res => res.ok ? res.text() : null)
                        .catch(() => null)
                );
                
                const resultados = await Promise.all(promises);
                let todosDados = [];
                
                resultados.forEach((texto, index) => {
                    if (texto) {
                        const dados = parseCSV(texto);
                        todosDados = [...todosDados, ...dados];
                        console.log(`Carregados ${dados.length} registros de ${RECEITA_URLS[index]}`);
                    }
                });
                
                dadosCompletos = todosDados;
                
                if (dadosCompletos.length === 0) {
                    showError('Nenhum dado encontrado. Verifique os arquivos CSV.');
                } else {
                    console.log(`Total de registros carregados: ${dadosCompletos.length}`);
                    
                    // Definir ano padrão como o mais recente
                    const anos = [...new Set(dadosCompletos.map(i => i.ano_de_exercicio))].filter(Boolean).sort();
                    if (anos.length > 0) {
                        const anoAtual = anos[anos.length - 1];
                        filtrosGeral.ano = anoAtual;
                        filtrosCategoria.ano = anoAtual;
                        filtrosOrigem.ano = anoAtual;
                        filtrosClassificacao.ano = anoAtual;
                    }
                    
                    renderizarVisaoGeral();
                    renderizarCategoria();
                    renderizarOrigem();
                    renderizarClassificacao();
                    renderizarDownloads();
                }
            } catch (erro) {
                console.error('Erro:', erro);
                showError('Erro ao carregar dados. Tente novamente mais tarde.');
            } finally {
                mostrarLoading(false);
            }
        }

        function getOpcoesFiltro() {
            const anos = [...new Set(dadosCompletos.map(i => i.ano_de_exercicio))].filter(Boolean).sort().reverse();
            const orgaos = [...new Set(dadosCompletos.map(i => i.unidade_orcamentaria_nome))].filter(Boolean).sort();
            const categorias = [...new Set(dadosCompletos.map(i => i.categoria_receita_descricao))].filter(Boolean).sort();
            const origens = [...new Set(dadosCompletos.map(i => i.origem_receita_descricao))].filter(Boolean).sort();
            const especies = [...new Set(dadosCompletos.map(i => i.especie_receita_descricao))].filter(Boolean).sort();
            const tipos = [...new Set(dadosCompletos.map(i => i.tipo_receita_descricao))].filter(Boolean).sort();
            const itens = [...new Set(dadosCompletos.map(i => i.item_receita_descricao))].filter(Boolean).sort();
            const subitens = [...new Set(dadosCompletos.map(i => i.subitem_receita_descricao))].filter(Boolean).sort();
            const niveis1 = [...new Set(dadosCompletos.map(i => i.nivel_1_desdobramento_descricao))].filter(Boolean).sort();
            const niveis2 = [...new Set(dadosCompletos.map(i => i.nivel_2_desdobramento_descricao))].filter(Boolean).sort();
            const niveis3 = [...new Set(dadosCompletos.map(i => i.nivel_3_desdobramento_descricao))].filter(Boolean).sort();
            const classificacoes = [...new Set(dadosCompletos.map(i => i.classificacao_receita_formatado))].filter(Boolean).sort();
            
            return { anos, orgaos, categorias, origens, especies, tipos, itens, subitens, niveis1, niveis2, niveis3, classificacoes };
        }

        // ============================================
        // VISÃO GERAL
        // ============================================
        function renderizarVisaoGeral() {
            const container = document.getElementById('visao-geral-content');
            if (!container) return;
            
            const opcoes = getOpcoesFiltro();
            
            // Aplicar filtros
            let dadosFiltrados = aplicarFiltros(dadosCompletos, filtrosGeral);
            
            // Aplicar busca
            dadosFiltrados = aplicarBusca(dadosFiltrados, buscaGeral, ['unidade_orcamentaria_nome', 'categoria_receita_descricao']);
            
            // Agrupar por Órgão e Categoria
            const agrupado = {};
            dadosFiltrados.forEach(item => {
                const chave = `${item.unidade_orcamentaria_codigo}|${item.categoria_receita_descricao}`;
                if (!agrupado[chave]) {
                    agrupado[chave] = {
                        orgao_codigo: item.unidade_orcamentaria_codigo,
                        orgao_nome: item.unidade_orcamentaria_nome,
                        categoria: item.categoria_receita_descricao || 'Não categorizado',
                        totalPrevisto: 0,
                        totalPrevistoAtualizado: 0,
                        totalContabilizado: 0,
                        registros: []
                    };
                }
                agrupado[chave].totalPrevisto += item.valor_previsto_inicial || 0;
                agrupado[chave].totalPrevistoAtualizado += item.valor_previsto_atualizado || 0;
                agrupado[chave].totalContabilizado += item.valor_contabilizado || 0;
                agrupado[chave].registros.push(item);
            });
            
            let dadosTabela = Object.values(agrupado);
            
            // Calcular totais
            const totalPrevistoGeral = dadosFiltrados.reduce((acc, i) => acc + (i.valor_previsto_inicial || 0), 0);
            const totalPrevistoAtualizadoGeral = dadosFiltrados.reduce((acc, i) => acc + (i.valor_previsto_atualizado || 0), 0);
            const totalContabilizadoGeral = dadosFiltrados.reduce((acc, i) => acc + (i.valor_contabilizado || 0), 0);
            const percentualGeral = calcularPercentual(totalContabilizadoGeral, totalPrevistoGeral);
            
            // Dados para gráfico por Categoria
            const categoriasGrafico = {};
            dadosFiltrados.forEach(item => {
                const cat = item.categoria_receita_descricao || 'Não categorizado';
                categoriasGrafico[cat] = (categoriasGrafico[cat] || 0) + (item.valor_contabilizado || 0);
            });
            
            const dadosGrafico = Object.entries(categoriasGrafico)
                .map(([categoria, valor]) => ({ categoria, valor }))
                .sort((a, b) => b.valor - a.valor);
            
            // Aplicar ordenação
            dadosTabela.sort((a, b) => {
                let valA, valB;
                switch(ordenacaoGeral.coluna) {
                    case 'orgao':
                        valA = a.orgao_nome || '';
                        valB = b.orgao_nome || '';
                        break;
                    case 'categoria':
                        valA = a.categoria || '';
                        valB = b.categoria || '';
                        break;
                    case 'previsto':
                        valA = a.totalPrevisto;
                        valB = b.totalPrevisto;
                        break;
                    case 'previstoAtualizado':
                        valA = a.totalPrevistoAtualizado;
                        valB = b.totalPrevistoAtualizado;
                        break;
                    case 'contabilizado':
                        valA = a.totalContabilizado;
                        valB = b.totalContabilizado;
                        break;
                    case 'percentual':
                        valA = (a.totalContabilizado / a.totalPrevisto) || 0;
                        valB = (b.totalContabilizado / b.totalPrevisto) || 0;
                        break;
                    default:
                        valA = a.orgao_nome || '';
                        valB = b.orgao_nome || '';
                }
                
                if (ordenacaoGeral.direcao === 'asc') {
                    return valA > valB ? 1 : -1;
                } else {
                    return valA < valB ? 1 : -1;
                }
            });
            
            // Paginação
            const totalRegistros = dadosTabela.length;
            const totalPaginas = Math.ceil(totalRegistros / itensPorPagina);
            const inicio = (paginaAtual.geral - 1) * itensPorPagina;
            const dadosPagina = dadosTabela.slice(inicio, inicio + itensPorPagina);
            
            let html = `
                <!-- Filtros -->
                <div class="filter-container">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="filter-label"><i class="material-icons">calendar_today</i>Ano</label>
                            <select class="form-select" id="filtroAnoGeral" onchange="atualizarFiltroGeral('ano', this.value)">
                                ${opcoes.anos.map(a => `<option value="${a}" ${filtrosGeral.ano === a ? 'selected' : ''}>${a}</option>`).join('')}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="filter-label"><i class="material-icons">business</i>Órgão</label>
                            <select class="form-select" id="filtroOrgaoGeral" onchange="atualizarFiltroGeral('orgao', this.value)">
                                <option value="">Todos</option>
                                ${opcoes.orgaos.map(o => `<option value="${o}" ${filtrosGeral.orgao === o ? 'selected' : ''}>${o}</option>`).join('')}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="filter-label"><i class="material-icons">category</i>Categoria</label>
                            <select class="form-select" id="filtroCategoriaGeral" onchange="atualizarFiltroGeral('categoria', this.value)">
                                <option value="">Todas</option>
                                ${opcoes.categorias.map(c => `<option value="${c}" ${filtrosGeral.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mt-3">
                        <div class="col-md-8">
                            <input type="text" class="search-box w-100" id="buscaGeral" placeholder="Buscar órgão ou categoria..." value="${buscaGeral}" onkeyup="atualizarBuscaGeral(this.value)">
                        </div>
                        <div class="col-md-4 d-flex justify-content-end gap-2">
                            <button class="btn-search" onclick="aplicarFiltrosGeral()">
                                <i class="material-icons">search</i> Pesquisar
                            </button>
                            <button class="btn-secondary-custom" onclick="limparFiltrosGeral()">
                                <i class="material-icons">clear</i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Cards de Métricas -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="metric-card">
                            <div class="metric-label">Previsto Inicial</div>
                            <div class="metric-value">${formatarMoeda(totalPrevistoGeral)}</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="metric-card">
                            <div class="metric-label">Previsto Atualizado</div>
                            <div class="metric-value">${formatarMoeda(totalPrevistoAtualizadoGeral)}</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="metric-card">
                            <div class="metric-label">Contabilizado</div>
                            <div class="metric-value">${formatarMoeda(totalContabilizadoGeral)}</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="metric-card">
                            <div class="metric-label">% Arrecadação</div>
                            <div class="metric-value">${percentualGeral}%</div>
                        </div>
                    </div>
                </div>

                <!-- Gráfico por Categoria -->
                <div class="row mb-4">
                    <div class="col-md-12">
                        <div class="chart-container">
                            <div class="chart-header">
                                <h4 class="chart-title">Distribuição da Receita por Categoria</h4>
                            </div>
                            <div class="chart-wrapper">
                                <canvas id="chartCategoriaGeral"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Bar -->
                <div class="action-bar">
                    <span class="table-badge">Visão Geral: Órgão x Categoria (${totalRegistros.toLocaleString('pt-BR')} registros)</span>
                    <div class="action-group">
                        <button class="btn-export" onclick="exportarGeralCSV()"><i class="material-icons me-2">description</i>CSV</button>
                        <button class="btn-export" onclick="exportarGeralPDF()"><i class="material-icons me-2">print</i>PDF</button>
                        <div class="share-dropdown">
                            <button class="btn-export" onclick="toggleShare('geral')"><i class="material-icons me-2">share</i>Compartilhar</button>
                            <div class="share-options" id="shareOptions-geral">
                                <a href="#" onclick="copiarLink(event, 'geral')"><i class="fas fa-link"></i> Copiar Link</a>
                                <a href="#" onclick="compartilharFacebook(event, 'geral')"><i class="fab fa-facebook-f"></i> Facebook</a>
                                <a href="#" onclick="compartilharTwitter(event, 'geral')"><i class="fab fa-twitter"></i> Twitter</a>
                                <a href="#" onclick="compartilharLinkedIn(event, 'geral')"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
                                <a href="#" onclick="compartilharWhatsApp(event, 'geral')"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tabela -->
                <div class="table-container">
                    <div class="table-fixed-header-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th onclick="ordenarGeral('orgao')" class="sortable ${ordenacaoGeral.coluna === 'orgao' ? ordenacaoGeral.direcao : ''}">Órgão</th>
                                    <th onclick="ordenarGeral('categoria')" class="sortable ${ordenacaoGeral.coluna === 'categoria' ? ordenacaoGeral.direcao : ''}">Categoria</th>
                                    <th onclick="ordenarGeral('previsto')" class="sortable text-right ${ordenacaoGeral.coluna === 'previsto' ? ordenacaoGeral.direcao : ''}">Previsto Inicial</th>
                                    <th onclick="ordenarGeral('previstoAtualizado')" class="sortable text-right ${ordenacaoGeral.coluna === 'previstoAtualizado' ? ordenacaoGeral.direcao : ''}">Previsto Atualizado</th>
                                    <th onclick="ordenarGeral('contabilizado')" class="sortable text-right ${ordenacaoGeral.coluna === 'contabilizado' ? ordenacaoGeral.direcao : ''}">Contabilizado</th>
                                    <th onclick="ordenarGeral('percentual')" class="sortable text-center ${ordenacaoGeral.coluna === 'percentual' ? ordenacaoGeral.direcao : ''}">% Arrecadação</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${gerarLinhasTabelaGeral(dadosPagina)}
                            </tbody>
                            <tfoot class="table-footer">
                                <tr>
                                    <td colspan="2" class="fw-bold">TOTAL GERAL</td>
                                    <td class="text-right fw-bold">${formatarMoeda(totalPrevistoGeral)}</td>
                                    <td class="text-right fw-bold">${formatarMoeda(totalPrevistoAtualizadoGeral)}</td>
                                    <td class="text-right fw-bold">${formatarMoeda(totalContabilizadoGeral)}</td>
                                    <td class="text-center fw-bold">${percentualGeral}%</td>
                                    <td></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                    
                    <div class="pagination-container">
                        <div class="pagination-info">
                            Mostrando ${inicio+1}-${Math.min(inicio+itensPorPagina, totalRegistros)} de ${totalRegistros.toLocaleString('pt-BR')} registros
                        </div>
                        <nav>
                            <ul class="pagination mb-0">
                                <li class="page-item ${paginaAtual.geral === 1 ? 'disabled' : ''}">
                                    <a class="page-link" href="#" onclick="mudarPaginaGeral(${paginaAtual.geral - 1}); return false;">&laquo;</a>
                                </li>
                                ${Array.from({ length: Math.min(5, totalPaginas) }, (_, i) => {
                                    let inicioPaginas = Math.max(1, Math.min(paginaAtual.geral - 2, totalPaginas - 4));
                                    let num = inicioPaginas + i;
                                    if (num <= totalPaginas) {
                                        return `<li class="page-item ${num === paginaAtual.geral ? 'active' : ''}">
                                            <a class="page-link" href="#" onclick="mudarPaginaGeral(${num}); return false;">${num}</a>
                                        </li>`;

        function criarGraficoPizzaCategoria(dados) {
            const canvas = document.getElementById('chartCategoriaGeral');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            Chart.getChart(ctx)?.destroy();
            
            if (!dados || dados.length === 0) {
                ctx.font = '14px Montserrat';
                ctx.fillStyle = '#666';
                ctx.fillText('Sem dados para exibir', 10, 50);
                return;
            }
            
            // Cores para o gráfico
            const cores = ['#1a3a5c', '#b93c42', '#2c5f8a', '#db233f', '#3a7cb8', '#e67e22', '#27ae60', '#8e44ad', '#f39c12', '#16a085'];
            
            new Chart(ctx, {
                type: 'doughnut',
                data: { 
                    labels: dados.map(i => i.categoria.length > 30 ? i.categoria.substring(0, 30) + '...' : i.categoria), 
                    datasets: [{
                        data: dados.map(i => i.valor),
                        backgroundColor: cores.slice(0, dados.length),
                        borderWidth: 0
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            position: 'bottom',
                            labels: { font: { size: 11 } }
                        },
                        tooltip: { 
                            callbacks: { 
                                label: ctx => `${ctx.label}: ${formatarMoeda(ctx.raw)}` 
                            } 
                        } 
                    } 
                }
            });
        }

            if (!container) return;
            
            const opcoes = getOpcoesFiltro();
            
            // Aplicar filtros
            let dadosFiltrados = aplicarFiltros(dadosCompletos, filtrosCategoria);
            
            // Aplicar busca
            dadosFiltrados = aplicarBusca(dadosFiltrados, buscaCategoria, [
                'unidade_orcamentaria_nome',
                'categoria_receita_descricao', 
                'origem_receita_descricao', 
                'especie_receita_descricao', 
                'tipo_receita_descricao'
            ]);
            
            // Agrupar por Órgão e Categoria
            const agrupado = {};
            dadosFiltrados.forEach(item => {
                const chave = `${item.unidade_orcamentaria_codigo}|${item.categoria_receita_descricao}`;
                if (!agrupado[chave]) {
                    agrupado[chave] = {
                        orgao_codigo: item.unidade_orcamentaria_codigo,
                        orgao_nome: item.unidade_orcamentaria_nome,
                        categoria: item.categoria_receita_descricao || 'Não categorizado',
                        totalPrevisto: 0,
                        totalPrevistoAtualizado: 0,
                        totalContabilizado: 0,
                        registros: []

                agrupado[chave].totalPrevistoAtualizado += item.valor_previsto_atualizado || 0;

            // Aplicar ordenação

                        valB = b.orgao_nome || '';

                        valB = b.categoria || '';

                        valB = b.totalPrevisto;

                    default:
                        valA = a.orgao_nome || '';
                        valB = b.orgao_nome || '';
                }
                
                if (ordenacaoCategoria.direcao === 'asc') {
                    return valA > valB ? 1 : -1;

        function renderizarOrigem() {
            const container = document.getElementById('origem-content');
            if (!container) return;
            
            const opcoes = getOpcoesFiltro();
            
            // Aplicar filtros
            let dadosFiltrados = aplicarFiltros(dadosCompletos, filtrosOrigem);
            
            // Aplicar busca
            dadosFiltrados = aplicarBusca(dadosFiltrados, buscaOrigem, [
                'origem_receita_descricao',
                'unidade_orcamentaria_nome',
                'categoria_receita_descricao',
                'especie_receita_descricao',
                'tipo_receita_descricao',
                'classificacao_receita_formatado'
            ]);
            
            // Agrupar por Origem e demais campos
            const agrupado = {};
            dadosFiltrados.forEach(item => {
                const chave = `${item.origem_receita_descricao}|${item.unidade_orcamentaria_codigo}|${item.tipo_receita_descricao}|${item.categoria_receita_descricao}|${item.especie_receita_descricao}|${item.item_receita_descricao}|${item.subitem_receita_descricao}|${item.nivel_1_desdobramento_descricao}|${item.nivel_2_desdobramento_descricao}|${item.nivel_3_desdobramento_descricao}`;
                if (!agrupado[chave]) {
                    agrupado[chave] = {
                        origem: item.origem_receita_descricao || 'Não especificada',
                        orgao_codigo: item.unidade_orcamentaria_codigo,
                        orgao_nome: item.unidade_orcamentaria_nome,
                        tipo: item.tipo_receita_descricao || 'Não especificado',
                        categoria: item.categoria_receita_descricao || 'Não categorizado',
                        especie: item.especie_receita_descricao || 'Não especificada',
                        item: item.item_receita_descricao || 'Não especificado',
                        subitem: item.subitem_receita_descricao || 'Não especificado',
                        nivel1: item.nivel_1_desdobramento_descricao || 'Não especificado',
                        nivel2: item.nivel_2_desdobramento_descricao || 'Não especificado',
                        nivel3: item.nivel_3_desdobramento_descricao || 'Não especificado',

        // ============================================
        // CLASSIFICAÇÃO ORÇAMENTÁRIA
        // ============================================
        function renderizarClassificacao() {
            const container = document.getElementById('classificacao-content');
            if (!container) return;
            
            const opcoes = getOpcoesFiltro();
            
            // Aplicar filtros
            let dadosFiltrados = aplicarFiltros(dadosCompletos, filtrosClassificacao);
            
            // Aplicar busca
            dadosFiltrados = aplicarBusca(dadosFiltrados, buscaClassificacao, [
                'unidade_orcamentaria_nome', 
                'classificacao_receita_formatado'
            ]);
            
            // Agrupar por Órgão e Classificação
            const agrupado = {};
            dadosFiltrados.forEach(item => {
                const chave = `${item.unidade_orcamentaria_codigo}|${item.classificacao_receita_formatado}`;
                if (!agrupado[chave]) {
                    agrupado[chave] = {
                        orgao_codigo: item.unidade_orcamentaria_codigo,
                        orgao_nome: item.unidade_orcamentaria_nome,
                        classificacao: item.classificacao_receita_formatado || 'Não classificada',
                        totalPrevisto: 0,
                        totalPrevistoAtualizado: 0,
                        totalContabilizado: 0,
                        registros: []
                    };
                }
                agrupado[chave].totalPrevisto += item.valor_previsto_inicial || 0;
                agrupado[chave].totalPrevistoAtualizado += item.valor_previsto_atualizado || 0;
                agrupado[chave].totalContabilizado += item.valor_contabilizado || 0;
                agrupado[chave].registros.push(item);
            });
            
            let dadosTabela = Object.values(agrupado);
            
            // Calcular totais
            const totalPrevistoGeral = dadosFiltrados.reduce((acc, i) => acc + (i.valor_previsto_inicial || 0), 0);
            const totalPrevistoAtualizadoGeral = dadosFiltrados.reduce((acc, i) => acc + (i.valor_previsto_atualizado || 0), 0);
            const totalContabilizadoGeral = dadosFiltrados.reduce((acc, i) => acc + (i.valor_contabilizado || 0), 0);
            const percentualGeral = calcularPercentual(totalContabilizadoGeral, totalPrevistoGeral);
            
            // Aplicar ordenação
            dadosTabela.sort((a, b) => {
                let valA, valB;
                switch(ordenacaoClassificacao.coluna) {
                    case 'orgao':
                        valA = a.orgao_nome || '';
                        valB = b.orgao_nome || '';
                        break;
                    case 'classificacao':
                        valA = a.classificacao || '';
                        valB = b.classificacao || '';
                        break;
                    case 'previsto':
                        valA = a.totalPrevisto;
                        valB = b.totalPrevisto;
                        break;
                    case 'previstoAtualizado':
                        valA = a.totalPrevistoAtualizado;
                        valB = b.totalPrevistoAtualizado;
                        break;
                    case 'contabilizado':
                        valA = a.totalContabilizado;
                        valB = b.totalContabilizado;
                        break;
                    case 'percentual':
                        valA = (a.totalContabilizado / a.totalPrevisto) || 0;
                        valB = (b.totalContabilizado / b.totalPrevisto) || 0;
                        break;
                    default:
                        valA = a.orgao_nome || '';
                        valB = b.orgao_nome || '';
                }

        window.baixarCSV = function() {
            if (!dadosCompletos.length) return;
            
            const cabecalhos = [
                'ano_de_exercicio','mes_descritivo','unidade_orcamentaria_nome',
                'classificacao_receita_formatado','origem_receita_codigo','origem_receita_descricao',
                'categoria_receita_codigo','categoria_receita_descricao','especie_receita_codigo',
                'especie_receita_descricao','tipo_receita_codigo','tipo_receita_descricao',
                'item_receita_codigo','item_receita_descricao','subitem_receita_codigo',
                'subitem_receita_descricao','nivel_1_desdobramento_codigo','nivel_1_desdobramento_descricao',
                'nivel_2_desdobramento_codigo','nivel_2_desdobramento_descricao','nivel_3_desdobramento_codigo',
                'nivel_3_desdobramento_descricao','valor_previsto_inicial','valor_previsto_atualizado',
                'valor_contabilizado'
            ];
            
            const linhas = dadosCompletos.map(item => 
                cabecalhos.map(cab => `"${(item[cab] || '').toString().replace(/"/g, '""')}"`).join(';')
            );
            
            const csv = [cabecalhos.join(';'), ...linhas].join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'receita_publica_completa.csv';
            link.click();
        };
    </script>
